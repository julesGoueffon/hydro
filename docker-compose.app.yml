# Ce fichier gère UNIQUEMENT ton code applicatif (Python + React).
# Il s'attend à ce que docker-compose.infra.yml tourne déjà.

include:
  - docker-compose.infra.yml

services:
  # ========================================================
  # 1. L'API BACKEND (FastAPI)
  # ========================================================
  fastapi_backend:
    build: .
    container_name: fastapi_backend
    restart: on-failure
    # Assure-toi que ce chemin pointe vers ton bon fichier main.py FastAPI
    command: python -m uvicorn apps.rest_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_started
      mosquitto:
        condition: service_started
      minio-storage:
        condition: service_started

  # ========================================================
  # 2. L'INGESTION MQTT -> BDD (Le travailleur de l'ombre)
  # ========================================================
  mqtt_worker:
    build: .
    container_name: mqtt_worker
    restart: on-failure
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    # Le script qui écoute Mosquitto en permanence et écrit dans Postgres
    command: python apps/msg_processor/main_mqtt_processor.py
    depends_on:
      postgres:
        condition: service_started
      mosquitto:
        condition: service_started

  # ========================================================
  # 3. LE CERVEAU ASYNCHRONE (Celery Workers)
  # ========================================================
  celery_worker:
    build: .
    container_name: celery_worker
    restart: on-failure
    # On écoute les tâches de contrôle ET de vidéo via "common"
    command: celery -A apps.celery_brain.worker worker --loglevel=info
    environment:
      - SIM_SPEED=5
      - CELERY_BROKER=redis://redis_broker:6379/0
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  celery_beat:
    build: .
    container_name: celery_beat
    restart: on-failure
    # Le métronome qui déclenche les tâches à intervalle régulier
    command: celery -A apps.celery_brain.worker beat --loglevel=info
    environment:
      - SIM_SPEED=5
      - CELERY_BROKER=redis://redis_broker:6379/0
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  # ========================================================
  # 4. L'INTERFACE UTILISATEUR (React + Nginx)
  # ========================================================
  hydro_frontend:
    build:
      context: ./hydro-frontend
      dockerfile: Dockerfile
    container_name: hydro_frontend
    restart: always
    ports:
      # Port 80 exposé : Tu taperas juste l'IP du Pi dans ton navigateur
      - "80:80"
    depends_on:
      - fastapi_backend