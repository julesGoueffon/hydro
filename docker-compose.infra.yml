# Ce fichier contient UNIQUEMENT les services "lourds" (Bases de données, Brokers)
# Il peut être lancé seul pour le développement local.

services:
  # Portainer : Pour gérer tes containers
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data

  # Mosquitto : Le broker MQTT
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data

  # Redpanda : Kafka ultra-léger (Commande corrigée pour éviter le bug d'argument)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    container_name: redpanda
    command: >
      redpanda start 
      --smp 1 
      --memory 1G 
      --reserve-memory 0M 
      --overprovisioned 
      --node-id 0 
      --check=false 
      --kafka-addr PLAINTEXT://0.0.0.0:9092 
      --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  # Initialisation des Topics Kafka

  # Initialisation des Topics Kafka via script Bash
  kafka_setup:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    container_name: kafka_setup
    depends_on:
      - redpanda
    volumes:
      # On monte le script créé localement dans le conteneur
      - ./setup_kafka.sh:/setup_kafka.sh
    # On exécute le script avec bash explicitement (pas besoin de chmod sur Windows)
    entrypoint: [ "bash", "/setup_kafka.sh" ]

  # PostgreSQL + TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: greenhouse_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: greenhouse
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: greenhouse-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

  # MinIO
  minio_storage:
    image: minio/minio
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true # Permet de voir sans se loguer (optionnel)
    volumes:
      # 1. Persistance de la DB interne (utilisateurs, sessions)
      - ./grafana/data:/var/lib/grafana
      # 2. Provisioning (DataSource et Dashboards automatiques)
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - postgres
